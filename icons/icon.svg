<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7a003f"/>
      <stop offset=".55" stop-color="#a30055"/>
      <stop offset="1" stop-color="#e5007d"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".28"/>
      <stop offset=".5" stop-color="#ffffff" stop-opacity=".04"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect width="512" height="256" rx="96" fill="url(#gloss)"/>
  <!-- calendar card -->
  <rect x="116" y="128" width="280" height="256" rx="28" fill="#ffffff"/>
  <rect x="116" y="128" width="280" height="74" rx="28" fill="#ffd3e9"/>
  <rect x="116" y="176" width="280" height="26" fill="#ffd3e9"/>
  <!-- binder rings -->
  <rect x="170" y="100" width="24" height="64" rx="12" fill="#ffffff"/>
  <rect x="318" y="100" width="24" height="64" rx="12" fill="#ffffff"/>
  <!-- JFK letters -->
  <text x="256" y="330" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="110" fill="#c40068">JFK</text>
  <!-- checkmark accent -->
  <path d="M 200 415 l 34 34 l 78 -78" fill="none" stroke="#ffffff" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
